name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dart:
    name: Dart Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos

      - name: Run VM tests
        run: dart test

      - name: Run Web tests (Chrome)
        run: |
          cat > "$RUNNER_TEMP/chrome-no-sandbox" <<'EOF'
          #!/usr/bin/env bash
          exec "${{ steps.setup-chrome.outputs.chrome-path }}" --no-sandbox "$@"
          EOF
          chmod +x "$RUNNER_TEMP/chrome-no-sandbox"
          CHROME_EXECUTABLE="$RUNNER_TEMP/chrome-no-sandbox" dart test -p chrome test/web_block_test.dart

  flutter_integration:
    name: Flutter Integration Tests
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: integration_test
        run: flutter pub get

      - name: Run integration tests
        working-directory: integration_test
        run: flutter test block_io_integration_test.dart
